name: CI setup
description: Set up Python, Node.js, and workspace dependencies.

inputs:
  python-version:
    description: Python version to install. Leave empty to skip Python setup.
    required: false
    default: "3.14"
  python-cache-dependency-path:
    description: File path used to key the Python package-manager caches.
    required: false
    default: uv.lock
  node-version:
    description: Node.js version to install. Leave empty to skip Node setup.
    required: false
    default: "22"
  npm-cache-dependency-path:
    description: File path used to key the npm cache.
    required: false
    default: package-lock.json
  install-python-deps:
    description: Whether to install Python package dependencies.
    required: false
    default: "true"
  install-node-deps:
    description: Whether to install Node package dependencies.
    required: false
    default: "true"
  install-playwright:
    description: Whether to install Playwright browsers and OS dependencies.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Python
      if: inputs.python-version != ''
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: ${{ inputs.python-cache-dependency-path }}

    - name: Cache uv downloads
      if: inputs.python-version != ''
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/uv
        key: uv-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          uv-${{ runner.os }}-${{ inputs.python-version }}-
          uv-${{ runner.os }}-

    - name: Set up Node.js
      if: inputs.node-version != ''
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: ${{ inputs.npm-cache-dependency-path }}

    - name: Install Python dependencies
      if: inputs.install-python-deps == 'true' && inputs.python-version != ''
      shell: bash
      run: |
        python -m pip install --upgrade pip uv
        python_bin="$(python -c 'import sys; print(sys.executable)')"
        uv sync --all-groups --frozen --python "$python_bin"

    - name: Install Node dependencies
      if: inputs.install-node-deps == 'true' && inputs.node-version != ''
      shell: bash
      run: npm ci

    - name: Install Playwright browsers
      if: inputs.install-playwright == 'true'
      shell: bash
      run: make setup-playwright-ci
