name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PRIMARY_NODE_VERSION: "22"
  PRIMARY_PYTHON_VERSION: "3.12"

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: CI setup
        uses: ./.github/actions/ci-setup
        with:
          node-version: ${{ env.PRIMARY_NODE_VERSION }}
          python-version: ${{ env.PRIMARY_PYTHON_VERSION }}

      - name: Run parallel checks
        run: >-
          python scripts/ci/run_parallel_checks.py
          --timeout 1200
          lint-workflows
          lint-py
          format-py-check
          typecheck-py
          test-py
          format-js-check
          lint-js
          typecheck-web
          test-js

      - name: Build web and enforce size budget
        run: make web-build-size

      - name: Summarize quality gate
        if: always()
        run: |
          {
            echo "## Quality gate"
            echo
            echo "- Python: ${{ env.PRIMARY_PYTHON_VERSION }}"
            echo "- Node.js: ${{ env.PRIMARY_NODE_VERSION }}"
            echo "- Commit: ${{ github.sha }}"
          } >> "$GITHUB_STEP_SUMMARY"

  python-compatibility:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: CI setup
        uses: ./.github/actions/ci-setup
        with:
          node-version: ""
          python-version: ${{ matrix.python-version }}
          install-node-deps: "false"

      - name: Test Python compatibility
        run: make test-py

  node-compatibility:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "24"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ env.PRIMARY_NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ env.PRIMARY_NODE_VERSION }}-
            playwright-${{ runner.os }}-

      - name: CI setup
        uses: ./.github/actions/ci-setup
        with:
          node-version: ${{ matrix.node-version }}
          python-version: ""
          install-python-deps: "false"

      - name: Verify web compatibility
        run: make ci-web

  web-e2e:
    name: Web E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: CI setup
        uses: ./.github/actions/ci-setup
        with:
          node-version: ${{ env.PRIMARY_NODE_VERSION }}
          python-version: ""
          install-python-deps: "false"
          install-playwright: "true"

      - name: Test web E2E
        run: make web-e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-artifacts-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            playwright-report/
            test-results/

  ci-result:
    name: CI result
    if: always()
    needs:
      - quality-gate
      - python-compatibility
      - node-compatibility
      - web-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check required jobs
        run: |
          if [ "${{ needs.quality-gate.result }}" != "success" ] ||
             [ "${{ needs.python-compatibility.result }}" != "success" ] ||
             [ "${{ needs.node-compatibility.result }}" != "success" ] ||
             [ "${{ needs.web-e2e.result }}" != "success" ]; then
            echo "::error::One or more CI jobs failed."
            exit 1
          fi
