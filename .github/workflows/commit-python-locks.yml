name: Commit Refreshed Python Locks

on:
  workflow_run:
    workflows:
      - Refresh Python Locks
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.id || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  commit-locks:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.name == 'Refresh Python Locks' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      LOCK_REFRESH_ARTIFACT_NAME: python-lock-refresh-${{ github.event.workflow_run.pull_requests[0].number || 'unknown' }}
      LOCK_REFRESH_ROOT: .artifacts/lock-refresh
      LOCK_FILE_PATHSPEC: uv.lock
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - name: Checkout default branch workflow code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          persist-credentials: false

      - name: Detect lock refresh artifact
        id: artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          artifact_id=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts --jq '.artifacts[] | select(.name == "${{ env.LOCK_REFRESH_ARTIFACT_NAME }}") | .id' 2>/dev/null || true)
          if [ -n "$artifact_id" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download refreshed Python lock file
        if: steps.artifact.outputs.available == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.LOCK_REFRESH_ARTIFACT_NAME }}
          path: ${{ env.LOCK_REFRESH_ROOT }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Validate downloaded artifact contents
        if: steps.artifact.outputs.available == 'true'
        run: >-
          python3 scripts/ci/workflow_helpers.py validate-lock-artifact
          --root "${LOCK_REFRESH_ROOT}"

      - name: Read refresh metadata
        if: steps.artifact.outputs.available == 'true'
        id: metadata
        run: |
          metadata_json=$(python3 scripts/ci/workflow_helpers.py read-lock-metadata --root "$LOCK_REFRESH_ROOT")
          echo "pr-number=$(printf '%s' "$metadata_json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["pr-number"])')" >> "$GITHUB_OUTPUT"
          echo "head-sha=$(printf '%s' "$metadata_json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["head-sha"])')" >> "$GITHUB_OUTPUT"
          echo "head-ref=$(printf '%s' "$metadata_json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["head-ref"])')" >> "$GITHUB_OUTPUT"

      - name: Validate Dependabot branch state
        if: steps.artifact.outputs.available == 'true'
        id: branch-state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current_sha=$(gh pr view "${{ steps.metadata.outputs.pr-number }}" --json headRefOid --jq .headRefOid)
          current_ref=$(gh pr view "${{ steps.metadata.outputs.pr-number }}" --json headRefName --jq .headRefName)
          if [ "$current_sha" != "${{ steps.metadata.outputs.head-sha }}" ] || [ "$current_ref" != "${{ steps.metadata.outputs.head-ref }}" ]; then
            echo "Dependabot branch moved since lock refresh artifact generation; skipping stale commit." >&2
            echo "stale=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "stale=false" >> "$GITHUB_OUTPUT"

      - name: Copy refreshed Python lock file into workspace
        if: steps.artifact.outputs.available == 'true' && steps.branch-state.outputs.stale != 'true'
        run: cp "$LOCK_REFRESH_ROOT/uv.lock" uv.lock

      - name: Detect Python lock file changes
        if: steps.artifact.outputs.available == 'true' && steps.branch-state.outputs.stale != 'true'
        id: changes
        run: |
          git add uv.lock
          if git diff --staged --quiet -- uv.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit refreshed Python lock file with verified commit
        if: >-
          steps.artifact.outputs.available == 'true' &&
          steps.branch-state.outputs.stale != 'true' &&
          steps.changes.outputs.changed == 'true'
        uses: ./.github/actions/verified-commit
        with:
          github-token: ${{ github.token }}
          base-branch: ${{ steps.metadata.outputs.head-ref }}
          expected-head-sha: ${{ steps.metadata.outputs.head-sha }}
          commit-headline: "Refresh Python lock file [skip ci]"
          fallback-branch-prefix: ci/refresh-python-lock
          pr-title: "Refresh Python lock file"
          pr-body: |
            ## Summary
            - Type: CI maintenance
            - Refresh `uv.lock` to match the Dependabot Python update
            - Keep Python installs reproducible in local and CI workflows
          pathspec: ${{ env.LOCK_FILE_PATHSPEC }}

      - name: Summarize skipped refresh
        if: steps.artifact.outputs.available != 'true'
        run: |
          {
            echo "## Python lock refresh"
            echo
            echo "No lock refresh artifact was found for this workflow run."
          } >> "$GITHUB_STEP_SUMMARY"
