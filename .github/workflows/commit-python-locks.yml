name: Commit Refreshed Python Locks

on:
  workflow_run:
    workflows:
      - Refresh Python Locks
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.id || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-upstream:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.name == 'Refresh Python Locks' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    outputs:
      allowed: ${{ steps.context.outputs.allowed }}
      pr_number: ${{ steps.context.outputs.pr_number }}
      head_sha: ${{ steps.context.outputs.head_sha }}
      head_ref: ${{ steps.context.outputs.head_ref }}
    steps:
      - name: Checkout default branch workflow code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          persist-credentials: false

      - name: Validate trusted Dependabot pull request
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_REF: ${{ github.event.workflow_run.head_branch }}
        run: |
          if ! python3 scripts/ci/workflow_helpers.py validate-lock-context \
            --pr-number "$PR_NUMBER" \
            --head-sha "$HEAD_SHA" \
            --head-ref "$HEAD_REF"; then
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Python lock refresh"
              echo
              echo "Skipping writeback because the workflow-run context is invalid."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if pr_json=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}"); then
            :
          else
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Python lock refresh"
              echo
              echo "Skipping writeback because the current pull request could not be verified."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          pr_author=$(jq --raw-output '.user.login // ""' <<<"$pr_json")
          pr_repository=$(jq --raw-output '.head.repo.full_name // ""' <<<"$pr_json")
          pr_ref=$(jq --raw-output '.head.ref // ""' <<<"$pr_json")
          pr_sha=$(jq --raw-output '.head.sha // ""' <<<"$pr_json")
          pr_state=$(jq --raw-output '.state // ""' <<<"$pr_json")

          if [ "$pr_author" != "dependabot[bot]" ] || \
            [ "$pr_repository" != "$GITHUB_REPOSITORY" ] || \
            [ "$pr_ref" != "$HEAD_REF" ] || \
            [ "$pr_sha" != "$HEAD_SHA" ] || \
            [ "$pr_state" != "open" ]; then
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Python lock refresh"
              echo
              echo "Skipping writeback because the completed run does not match a current, open same-repository Dependabot PR."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "allowed=true"
            echo "pr_number=$PR_NUMBER"
            echo "head_sha=$HEAD_SHA"
            echo "head_ref=$HEAD_REF"
          } >> "$GITHUB_OUTPUT"

  commit-locks:
    needs: validate-upstream
    if: needs.validate-upstream.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_ID: ${{ vars.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      LOCK_REFRESH_ARTIFACT_NAME: python-lock-refresh-${{ needs.validate-upstream.outputs.pr_number }}
      LOCK_REFRESH_PR_NUMBER: ${{ needs.validate-upstream.outputs.pr_number }}
      LOCK_REFRESH_HEAD_SHA: ${{ needs.validate-upstream.outputs.head_sha }}
      LOCK_REFRESH_HEAD_REF: ${{ needs.validate-upstream.outputs.head_ref }}
      LOCK_REFRESH_ROOT: .artifacts/lock-refresh
      LOCK_FILE_PATHSPEC: uv.lock
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - name: Checkout default branch workflow code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          persist-credentials: false

      - name: Check GitHub App credentials
        id: credentials
        run: |
          if [ -n "$APP_ID" ] && [ -n "$APP_PRIVATE_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub App token
        if: steps.credentials.outputs.available == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          app-id: ${{ env.APP_ID }}
          private-key: ${{ env.APP_PRIVATE_KEY }}

      - name: Detect lock refresh artifact
        id: artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          artifact_id=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${{ github.event.workflow_run.id }}/artifacts" --jq '.artifacts[] | select(.name == env.LOCK_REFRESH_ARTIFACT_NAME) | .id' 2>/dev/null || true)
          if [ -n "$artifact_id" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download refreshed Python lock file
        if: steps.artifact.outputs.available == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.LOCK_REFRESH_ARTIFACT_NAME }}
          path: ${{ env.LOCK_REFRESH_ROOT }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Validate downloaded artifact contents
        if: steps.artifact.outputs.available == 'true'
        run: >-
          python3 scripts/ci/workflow_helpers.py validate-lock-artifact
          --root "${LOCK_REFRESH_ROOT}"

      - name: Validate Dependabot branch state
        if: steps.artifact.outputs.available == 'true'
        id: branch-state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! pr_json=$(gh pr view "$LOCK_REFRESH_PR_NUMBER" --json headRefOid,headRefName,state 2>/dev/null); then
            echo "Could not look up Dependabot PR #${LOCK_REFRESH_PR_NUMBER}; skipping stale commit." >&2
            echo "stale=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          current_sha=$(jq --raw-output '.headRefOid // ""' <<<"$pr_json")
          current_ref=$(jq --raw-output '.headRefName // ""' <<<"$pr_json")
          current_state=$(jq --raw-output '.state // ""' <<<"$pr_json")
          if [ "$current_state" != "OPEN" ] || \
            [ "$current_sha" != "$LOCK_REFRESH_HEAD_SHA" ] || \
            [ "$current_ref" != "$LOCK_REFRESH_HEAD_REF" ]; then
            echo "Dependabot PR #${LOCK_REFRESH_PR_NUMBER} moved or closed since lock refresh workflow run; skipping stale commit." >&2
            echo "stale=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "stale=false" >> "$GITHUB_OUTPUT"

      - name: Copy refreshed Python lock file into workspace
        if: steps.artifact.outputs.available == 'true' && steps.branch-state.outputs.stale != 'true'
        run: cp "$LOCK_REFRESH_ROOT/uv.lock" uv.lock

      - name: Detect Python lock file changes
        if: steps.artifact.outputs.available == 'true' && steps.branch-state.outputs.stale != 'true'
        id: changes
        run: |
          git add uv.lock
          if git diff --staged --quiet -- uv.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Note GitHub App token fallback
        if: >-
          steps.artifact.outputs.available == 'true' &&
          steps.branch-state.outputs.stale != 'true' &&
          steps.changes.outputs.changed == 'true' &&
          steps.credentials.outputs.available != 'true'
        run: |
          {
            echo "## Python lock refresh"
            echo
            echo "GitHub App credentials are not configured, so this run will commit with GITHUB_TOKEN."
            echo "The refreshed lock file will still be written back, but the commit may not be verified by the app."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit refreshed Python lock file with GitHub App token
        if: >-
          steps.artifact.outputs.available == 'true' &&
          steps.branch-state.outputs.stale != 'true' &&
          steps.changes.outputs.changed == 'true' &&
          steps.credentials.outputs.available == 'true'
        uses: ./.github/actions/verified-commit
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          base-branch: ${{ env.LOCK_REFRESH_HEAD_REF }}
          expected-head-sha: ${{ env.LOCK_REFRESH_HEAD_SHA }}
          commit-headline: "Refresh Python lock file"
          fallback-branch-prefix: ci/refresh-python-lock
          pr-title: "Refresh Python lock file"
          pr-body: |
            ## Summary
            - Type: CI maintenance
            - Refresh `uv.lock` to match the Dependabot Python update
            - Keep Python installs reproducible in local and CI workflows
          pathspec: ${{ env.LOCK_FILE_PATHSPEC }}

      - name: Commit refreshed Python lock file with fallback token
        if: >-
          steps.artifact.outputs.available == 'true' &&
          steps.branch-state.outputs.stale != 'true' &&
          steps.changes.outputs.changed == 'true' &&
          steps.credentials.outputs.available != 'true'
        uses: ./.github/actions/verified-commit
        with:
          github-token: ${{ github.token }}
          base-branch: ${{ env.LOCK_REFRESH_HEAD_REF }}
          expected-head-sha: ${{ env.LOCK_REFRESH_HEAD_SHA }}
          commit-headline: "Refresh Python lock file"
          fallback-branch-prefix: ci/refresh-python-lock
          pr-title: "Refresh Python lock file"
          pr-body: |
            ## Summary
            - Type: CI maintenance
            - Refresh `uv.lock` to match the Dependabot Python update
            - Keep Python installs reproducible in local and CI workflows
          pathspec: ${{ env.LOCK_FILE_PATHSPEC }}

      - name: Summarize skipped refresh
        if: steps.artifact.outputs.available != 'true'
        run: |
          {
            echo "## Python lock refresh"
            echo
            echo "No lock refresh artifact was found for this workflow run."
          } >> "$GITHUB_STEP_SUMMARY"
