name: Dependency Audit

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: npm audit (filtered)
        run: |
          npm audit --json > audit.json || true
          node - <<'NODE'
          const fs = require('fs');

          const audit = JSON.parse(fs.readFileSync('audit.json', 'utf8'));
          const allow = JSON.parse(fs.readFileSync('.github/npm-audit-allowlist.json', 'utf8'));

          const allowGhsas = new Set(allow.ghsas || []);
          const allowModules = new Set(allow.modules || []);

          const vulns = audit.vulnerabilities || {};
          const blocking = [];

          for (const v of Object.values(vulns)) {
            const via = Array.isArray(v.via) ? v.via : [];
            const isAllowed = via.length > 0 && via.every(item => {
              if (typeof item === 'string') return allowModules.has(item);
              if (item && item.url) {
                const ghsa = item.url.split('/').pop();
                return allowGhsas.has(ghsa) || allowModules.has(item.name);
              }
              return false;
            });

            if (!isAllowed) blocking.push(v);
          }

          if (blocking.length) {
            console.error('Blocked vulnerabilities:', blocking.map(v => v.name));
            process.exit(1);
          }

          console.log('npm audit passed with allowlist');
          NODE

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pip-audit
      - name: pip audit
        run: pip-audit --strict
