name: Dependency Audit

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: make node-install
      - name: npm audit
        run: make audit-node
      - name: Check if npm overrides are still needed
        run: make check-overrides

  pip-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: uv.lock
      - name: Cache uv downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-3.14-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-3.14-
            uv-${{ runner.os }}-
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install uv
      - name: pip audit
        run: make audit-python

  report-failure:
    needs: [npm-audit, pip-audit]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Open or update the dependency-audit issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          label="dependency-audit"
          gh label create "$label" -R "$REPO" --color B60205 \
            --description "Scheduled dependency audit failures" 2>/dev/null || true
          body="The scheduled dependency audit failed. Review the npm/pip audit and override checks: $RUN_URL"
          number="$(gh issue list -R "$REPO" --state open --label "$label" \
            --json number --jq '.[0].number // empty')"
          if [ -n "$number" ]; then
            gh issue comment "$number" -R "$REPO" --body "$body"
          else
            gh issue create -R "$REPO" --title "Dependency audit failed" \
              --label "$label" --body "$body"
          fi
