name: Publish

on:
  release:
    types: [published]

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install hatch
          hatch build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cd9f54aa2f37f504a2c46bb5b0d7e0c08b1b7b13 # v1

  publish-docker:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - name: Setup Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login to GHCR
        uses: docker/login-action@e92390c5fb421da1463c202d546fed0ec5c39f20 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build metadata
        id: image-meta
        run: |
          echo "image=ghcr.io/${{ github.repository }}" >> "$GITHUB_OUTPUT"
          echo "version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          echo "revision=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "source_url=https://github.com/${{ github.repository }}" >> "$GITHUB_OUTPUT"
      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image-meta.outputs.image }}:${{ steps.image-meta.outputs.version }}
            ${{ steps.image-meta.outputs.image }}:latest
          build-args: |
            VERSION=${{ steps.image-meta.outputs.version }}
            REVISION=${{ steps.image-meta.outputs.revision }}
            SOURCE_URL=${{ steps.image-meta.outputs.source_url }}
      - name: Scan published image
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # 0.28.0
        with:
          image-ref: ${{ steps.image-meta.outputs.image }}:${{ steps.image-meta.outputs.version }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
