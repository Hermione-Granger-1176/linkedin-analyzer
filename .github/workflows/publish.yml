name: Publish

on:
  release:
    types: [published]

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: uv.lock
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install hatch twine
          hatch build
      - name: Validate distributions
        run: |
          twine check dist/*
          python -m venv .venv-publish-check
          . .venv-publish-check/bin/activate
          pip install --upgrade pip
          pip install dist/*.whl
          linkedin-analyzer --version
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  publish-docker:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - name: Setup Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          cache-binary: true
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build metadata
        id: image-meta
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          echo "revision=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "source_url=https://github.com/${{ github.repository }}" >> "$GITHUB_OUTPUT"
      - name: Build local image for scanning
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          load: true
          tags: ${{ steps.image-meta.outputs.image }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.image-meta.outputs.version }}
            REVISION=${{ steps.image-meta.outputs.revision }}
            SOURCE_URL=${{ steps.image-meta.outputs.source_url }}
      - name: Smoke test local image
        run: docker run --rm ${{ steps.image-meta.outputs.image }}:scan --version
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: ${{ steps.image-meta.outputs.image }}:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          tags: |
            ${{ steps.image-meta.outputs.image }}:${{ steps.image-meta.outputs.version }}
            ${{ steps.image-meta.outputs.image }}:sha-${{ github.sha }}
            ${{ steps.image-meta.outputs.image }}:latest
          build-args: |
            VERSION=${{ steps.image-meta.outputs.version }}
            REVISION=${{ steps.image-meta.outputs.revision }}
            SOURCE_URL=${{ steps.image-meta.outputs.source_url }}
