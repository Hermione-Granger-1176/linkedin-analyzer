name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  require-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      checks: read
    steps:
      - name: Require green CI for the release commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_REF_NAME}" --jq '.sha')"
          echo "Release tag ${GITHUB_REF_NAME} resolves to commit ${sha}"
          conclusion="$(gh api \
            "repos/${GITHUB_REPOSITORY}/commits/${sha}/check-runs?check_name=CI%20result&status=completed" \
            --jq '.check_runs | sort_by(.completed_at) | last | .conclusion // "missing"')"
          echo "Latest 'CI result' conclusion: ${conclusion}"
          if [ "${conclusion}" != "success" ]; then
            echo "::error::CI result for ${sha} is '${conclusion}', refusing to publish."
            exit 1
          fi

  publish-pypi:
    needs: require-ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install hatch==1.17.0 twine==6.2.0
          hatch build
      - name: Validate distributions
        run: |
          twine check dist/*
          python -m venv .venv-publish-check
          . .venv-publish-check/bin/activate
          pip install --upgrade pip
          pip install dist/*.whl
          actual="$(linkedin-analyzer --version | awk '{print $NF}')"
          expected="${GITHUB_REF_NAME#v}"
          if [ "$actual" != "$expected" ]; then
            echo "::error::Built version $actual does not match release tag $expected"
            exit 1
          fi
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          skip-existing: true

  publish-docker:
    needs: [require-ci, publish-pypi]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Setup QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - name: Setup Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          cache-binary: true
      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build metadata
        id: image-meta
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          # Docker tags keep the raw vX.Y.Z; build args/labels need a PEP 440 version.
          tag_version="${{ github.event.release.tag_name }}"
          version="${tag_version#v}"
          {
            echo "image=${image}"
            echo "version=${version}"
            echo "revision=${{ github.sha }}"
            echo "source_url=https://github.com/${{ github.repository }}"
          } >> "$GITHUB_OUTPUT"
          # Prereleases must never re-point the floating :latest tag.
          {
            echo "tags<<TAGS_EOF"
            echo "${image}:${tag_version}"
            echo "${image}:sha-${{ github.sha }}"
            if [ "${{ github.event.release.prerelease }}" != "true" ]; then
              echo "${image}:latest"
            fi
            echo "TAGS_EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Build local image for scanning
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: ${{ steps.image-meta.outputs.image }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.image-meta.outputs.version }}
            REVISION=${{ steps.image-meta.outputs.revision }}
            SOURCE_URL=${{ steps.image-meta.outputs.source_url }}
      - name: Smoke test local image
        run: |
          actual="$(docker run --rm ${{ steps.image-meta.outputs.image }}:scan --version | awk '{print $NF}')"
          expected="${GITHUB_REF_NAME#v}"
          if [ "$actual" != "$expected" ]; then
            echo "::error::Image version $actual does not match release tag $expected"
            exit 1
          fi
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: ${{ steps.image-meta.outputs.image }}:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          tags: ${{ steps.image-meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.image-meta.outputs.version }}
            REVISION=${{ steps.image-meta.outputs.revision }}
            SOURCE_URL=${{ steps.image-meta.outputs.source_url }}
