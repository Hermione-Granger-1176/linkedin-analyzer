name: Publish

on:
  release:
    types: [published]

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install hatch twine
          hatch build
      - name: Validate distributions
        run: |
          twine check dist/*
          python -m venv .venv-publish-check
          . .venv-publish-check/bin/activate
          pip install --upgrade pip
          pip install dist/*.whl
          linkedin-analyzer --version
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0

  publish-docker:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Setup Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build metadata
        id: image-meta
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          echo "revision=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "source_url=https://github.com/${{ github.repository }}" >> "$GITHUB_OUTPUT"
      - name: Build local image for scanning
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          load: true
          tags: ${{ steps.image-meta.outputs.image }}:scan
          build-args: |
            VERSION=${{ steps.image-meta.outputs.version }}
            REVISION=${{ steps.image-meta.outputs.revision }}
            SOURCE_URL=${{ steps.image-meta.outputs.source_url }}
      - name: Smoke test local image
        run: docker run --rm ${{ steps.image-meta.outputs.image }}:scan --version
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ steps.image-meta.outputs.image }}:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image-meta.outputs.image }}:${{ steps.image-meta.outputs.version }}
            ${{ steps.image-meta.outputs.image }}:sha-${{ github.sha }}
            ${{ steps.image-meta.outputs.image }}:latest
          build-args: |
            VERSION=${{ steps.image-meta.outputs.version }}
            REVISION=${{ steps.image-meta.outputs.revision }}
            SOURCE_URL=${{ steps.image-meta.outputs.source_url }}
