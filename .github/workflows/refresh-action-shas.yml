name: Refresh Action SHAs

on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      APP_ID: ${{ vars.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
    steps:
      - name: Check GitHub App credentials
        id: credentials
        run: |
          if [ -n "$APP_ID" ] && [ -n "$APP_PRIVATE_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub App token
        if: steps.credentials.outputs.available == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          app-id: ${{ env.APP_ID }}
          private-key: ${{ env.APP_PRIVATE_KEY }}

      - name: Checkout repository
        if: steps.credentials.outputs.available == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          persist-credentials: false

      - name: Capture default branch HEAD SHA
        if: steps.credentials.outputs.available == 'true'
        id: head
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Update action SHAs
        if: steps.credentials.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: python3 scripts/ci/refresh_action_shas.py

      - name: Detect workflow changes
        if: steps.credentials.outputs.available == 'true'
        id: changes
        run: |
          git add .github/workflows .github/actions
          if git diff --staged --quiet -- .github/workflows .github/actions; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes with verified commit
        if: >-
          steps.credentials.outputs.available == 'true' &&
          steps.changes.outputs.changed == 'true'
        uses: ./.github/actions/verified-commit
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          base-branch: ${{ github.event.repository.default_branch }}
          expected-head-sha: ${{ steps.head.outputs.sha }}
          commit-headline: "Refresh action SHAs"
          fallback-branch-prefix: ci/refresh-action-shas
          pr-title: "Refresh action SHAs"
          pr-body: |
            ## Summary
            - Type: CI maintenance
            - Pin GitHub Actions to full commit SHAs for reproducible runs
            - Keep workflow behavior unchanged
          pathspec: |
            .github/workflows
            .github/actions

      - name: Note missing app credentials
        if: steps.credentials.outputs.available != 'true'
        run: |
          {
            echo "## Refresh Action SHAs"
            echo
            echo "Skipped because APP_ID and APP_PRIVATE_KEY are not configured."
          } >> "$GITHUB_STEP_SUMMARY"
