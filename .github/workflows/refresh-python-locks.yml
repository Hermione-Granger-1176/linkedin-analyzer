name: Refresh Python Locks

on:
  pull_request:
    branches:
      - main
    paths:
      - pyproject.toml
      - uv.lock
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  refresh-locks:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      startsWith(github.event.pull_request.head.ref, 'dependabot/uv/') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHON_VERSION: "3.12"
      LOCK_REFRESH_ARTIFACT_NAME: python-lock-refresh-${{ github.event.pull_request.number }}
      LOCK_REFRESH_ROOT: .artifacts
    steps:
      - name: Checkout Dependabot branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: uv.lock

      - name: Cache uv downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-
            uv-${{ runner.os }}-

      - name: Refresh Python lock file
        run: |
          python -m pip install --upgrade pip uv
          make lock

      - name: Write refresh metadata
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          mkdir -p "$LOCK_REFRESH_ROOT"
          printf '%s\n' "$PR_NUMBER" > "$LOCK_REFRESH_ROOT/pr-number.txt"
          printf '%s\n' "$HEAD_SHA" > "$LOCK_REFRESH_ROOT/head-sha.txt"
          printf '%s\n' "$HEAD_REF" > "$LOCK_REFRESH_ROOT/head-ref.txt"

      - name: Upload refreshed Python lock file
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.LOCK_REFRESH_ARTIFACT_NAME }}
          path: |
            uv.lock
            ${{ env.LOCK_REFRESH_ROOT }}/pr-number.txt
            ${{ env.LOCK_REFRESH_ROOT }}/head-sha.txt
            ${{ env.LOCK_REFRESH_ROOT }}/head-ref.txt
          if-no-files-found: error
          overwrite: true
