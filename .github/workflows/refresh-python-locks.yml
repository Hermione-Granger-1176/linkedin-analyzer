name: Refresh Python Locks

on:
  pull_request:
    branches:
      - main
    paths:
      - pyproject.toml
      - uv.lock
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  refresh-locks:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      startsWith(github.event.pull_request.head.ref, 'dependabot/uv/') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHON_VERSION: "3.14"
      LOCK_REFRESH_ARTIFACT_NAME: python-lock-refresh-${{ github.event.pull_request.number }}
    steps:
      - name: Checkout Dependabot branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: uv.lock

      - name: Cache uv downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-
            uv-${{ runner.os }}-

      - name: Refresh Python lock file
        run: |
          python -m pip install --upgrade pip uv
          make lock

      - name: Upload refreshed Python lock file
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.LOCK_REFRESH_ARTIFACT_NAME }}
          path: uv.lock
          if-no-files-found: error
          overwrite: true
