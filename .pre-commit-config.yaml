repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: ["src/", "tests/", "scripts/ci/"]
      - id: ruff-format
        args: ["src/", "tests/", "scripts/ci/"]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: .venv/bin/mypy src/
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: .venv/bin/pytest tests/ -v
        language: system
        pass_filenames: false
      - id: eslint
        name: eslint
        entry: npm run lint
        language: system
        pass_filenames: false
      - id: prettier-check
        name: prettier-check
        entry: npm run format:check
        language: system
        pass_filenames: false
      - id: web-typecheck
        name: web-typecheck
        entry: npm run typecheck:web
        language: system
        pass_filenames: false
      - id: node-test
        name: node-test
        entry: npm run test
        language: system
        pass_filenames: false
