repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: ["src/", "tests/"]
      - id: ruff-format
        args: ["src/", "tests/"]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: .venv/bin/mypy src/
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: .venv/bin/pytest tests/ -v
        language: system
        pass_filenames: false
      - id: eslint
        name: eslint
        entry: npm run lint:web
        language: system
        pass_filenames: false
      - id: node-test
        name: node-test
        entry: npm run test:web
        language: system
        pass_filenames: false
